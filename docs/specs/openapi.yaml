openapi: 3.1.0
info:
  title: Keiba DB API
  version: 0.1.0
  description: |
    Keiba DB の REST API 定義。

    issue #183 では、レース詳細画面で使う「印（出走馬ごとの予想記号）」を
    自動保存するための API を定義する。

    レース詳細画面そのもの（レース情報＋出馬表＋初期表示用の印情報）は
    Inertia 経由でサーバーから渡されるため、対応する JSON GET API は持たない。
servers:
  - url: /
    description: 同一オリジン

tags:
  - name: race-mark-columns
    description: レースの印列（自分の印列・他人の印列）の管理
  - name: race-marks
    description: 出走馬ごとの印の値の設定・解除
  - name: race-mark-memos
    description: |
      出走馬の印に対するメモ（issue #189）の管理。
      他人の印列（`type=other`）の各印にメモを残すための API。
      メモは印（`race_marks`）と独立したライフサイクルを持つ。印を変更・解除してもメモは残る。
  - name: horse-notes
    description: 競走馬ごとのメモ（issue #25）の管理。レース紐づきあり・なしの両方に対応する

paths:
  /api/races/{uid}/mark-columns:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
    get:
      tags: [race-mark-columns]
      summary: 自分が所有する印列の一覧取得
      description: |
        指定レースにおける、認証ユーザー所有の印列をすべて返す。
        `display_order` 昇順で返す。自分の印列（`type=own`）は必ず 1 件含まれ、
        存在しない場合はサーバ側で自動生成された上で返される。
      operationId: listRaceMarkColumns
      security:
        - sessionAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [race-mark-columns]
      summary: 他人の印列を追加
      description: |
        指定レースに「他人の印列」を 1 列追加する。
        `display_order` はサーバ側で末尾に採番される。
        自分の印列（`type=own`）はこの API では作成できない。
      operationId: createOtherRaceMarkColumn
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  maxLength: 32
                  description: 列ラベル（空文字列許容、後から PATCH で更新可能）
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/races/{uid}/mark-columns/{id}:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 印列 ID
    patch:
      tags: [race-mark-columns]
      summary: 列ラベル更新
      description: |
        他人の印列のラベルを更新する。自分の印列（`type=own`）に対してリクエストすると 422 を返す。
      operationId: updateRaceMarkColumnLabel
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  maxLength: 32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [race-mark-columns]
      summary: 他人の印列を削除
      description: |
        他人の印列とその列に紐づく印（`race_marks`）をすべて削除する。
        自分の印列（`type=own`）は削除できない（422 を返す）。
      operationId: deleteRaceMarkColumn
      security:
        - sessionAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/races/{uid}/mark-columns/{column_id}/entries/{race_entry_id}/mark:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
      - name: column_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 印列 ID
      - name: race_entry_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 出走馬 ID（race_entries.id）
    put:
      tags: [race-marks]
      summary: 印を設定（または解除）
      description: |
        指定列・指定出走馬に対する印を upsert する。
        `mark_value` が空文字列の場合は印を解除（該当レコードを削除）し、
        その場合のレスポンスは 204 を返す。
      operationId: putRaceMark
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mark_value]
              properties:
                mark_value:
                  oneOf:
                    - $ref: "#/components/schemas/MarkValue"
                    - type: string
                      enum: [""]
                      description: 空文字列を渡すと印を解除する
      responses:
        "200":
          description: 印を設定または更新した
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkValue"
        "204":
          description: 印を解除した（mark_value が空文字列の場合）
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/races/{uid}/mark-columns/{column_id}/entries/{race_entry_id}/memo:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
      - name: column_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 印列 ID（race_mark_columns.id）。`type=other` のみ受け付ける。
      - name: race_entry_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 出走馬 ID（race_entries.id）
    put:
      tags: [race-mark-memos]
      summary: 印メモを作成または更新
      description: |
        指定列・指定出走馬に対する印メモを upsert する。
        対象列が `type=own` の場合は 422 を返す（自分の印に対するメモは horse-notes で管理するため対象外）。
        他ユーザー所有の印列に対するリクエストは 403 を返す。
        該当の印（`race_marks`）が存在しない場合でもメモは作成可能（印を後から消してもメモは残る仕様）。
      operationId: putRaceMarkMemo
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  description: メモ本文。プレーンテキスト、改行可。
      responses:
        "200":
          description: 印メモを更新した
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkMemo"
        "201":
          description: 印メモを新規作成した
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkMemo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [race-mark-memos]
      summary: 印メモを削除
      description: |
        指定列・指定出走馬に紐づく印メモを削除する。
        対象列が `type=own` の場合は 422 を返す。
        他ユーザー所有の印列に対するリクエストは 403 を返す。
      operationId: deleteRaceMarkMemo
      security:
        - sessionAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/horses/{horse}/notes:
    parameters:
      - $ref: "#/components/parameters/HorseId"
    get:
      tags: [horse-notes]
      summary: 競走馬の全メモ一覧取得
      description: |
        指定競走馬に対する、認証ユーザーの全メモを返す。
        レース紐づきあり・なしの両方を含む。`updated_at` 降順で返す。
        競走馬詳細画面（`/horses/{horse}`）で使用する。
      operationId: listHorseNotes
      security:
        - sessionAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HorseNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [horse-notes]
      summary: メモを作成
      description: |
        指定競走馬に対するメモを 1 件作成する。
        `race_id` を指定するとそのレースに紐づくメモになり、省略または null の場合はレースに紐づかないメモ（次走への備忘録など）になる。
        同一ユーザー × 同一馬 × 同一 race_id（null 含む）の組み合わせで既にメモが存在する場合は 422 を返す。
      operationId: createHorseNote
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                race_id:
                  type: [integer, "null"]
                  format: int64
                  description: 紐づけるレース ID。null または省略でレースに紐づかないメモ
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  description: メモ本文。プレーンテキスト、改行可
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/HorseNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/horse-notes/{note}:
    parameters:
      - name: note
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: メモ ID（horse_notes.id）
    put:
      tags: [horse-notes]
      summary: メモを更新
      description: |
        指定メモの本文を更新する。`content` のみ更新可能で、紐づく馬・レースは変更できない。
        他ユーザー所有のメモに対するリクエストは 403 を返す。
      operationId: updateHorseNote
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/HorseNote"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [horse-notes]
      summary: メモを削除
      description: |
        指定メモを物理削除する。soft delete は行わない。
        他ユーザー所有のメモに対するリクエストは 403 を返す。
      operationId: deleteHorseNote
      security:
        - sessionAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    RaceUid:
      name: uid
      in: path
      required: true
      schema:
        type: string
      description: レースの公開 UID（races.uid）

    HorseId:
      name: horse
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 競走馬 ID（horses.id）

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Laravel のセッション Cookie。CSRF トークンも併用する。

  schemas:
    MarkValue:
      type: string
      enum:
        - "◎"
        - "○"
        - "▲"
        - "△"
        - "☆"
        - "✓"
      description: |
        印の種類。6 種類のいずれか（本命 ◎ / 対抗 ○ / 単穴 ▲ / 連下 △ / 穴 ☆ / チェック ✓）。
        issue #206 で穴馬の記号を `×` から標準的な `☆` に変更（`×` は本来「消し」を意味するため）。

    RaceMarkColumnType:
      type: string
      enum: [own, other]
      description: |
        印列の種類。
        - `own`: ログインユーザー自身の印列。1 ユーザー 1 レースに 1 列固定。
        - `other`: 他人の印列。レース内で 0 列以上、動的に追加削除可能。

    RaceMarkColumn:
      type: object
      required: [id, type, label, display_order]
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/RaceMarkColumnType"
        label:
          type: [string, "null"]
          maxLength: 32
          description: 列ラベル。`type=own` のときは null。`type=other` のときは文字列（空文字列を含む）。
        display_order:
          type: integer
          minimum: 0
          description: 表示順。昇順で並べる。

    RaceMarkValue:
      type: object
      required: [column_id, race_entry_id, mark_value]
      properties:
        column_id:
          type: integer
          format: int64
          description: 印列 ID（race_mark_columns.id）
        race_entry_id:
          type: integer
          format: int64
          description: 出走馬 ID（race_entries.id）
        mark_value:
          $ref: "#/components/schemas/MarkValue"

    RaceMarkMemo:
      type: object
      required:
        [
          id,
          race_mark_column_id,
          race_entry_id,
          content,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: integer
          format: int64
        race_mark_column_id:
          type: integer
          format: int64
          description: 印列 ID（race_mark_columns.id）
        race_entry_id:
          type: integer
          format: int64
          description: 出走馬 ID（race_entries.id）
        content:
          type: string
          maxLength: 1000
          description: メモ本文 プレーンテキスト
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    HorseNote:
      type: object
      required: [id, horse_id, race_id, content, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        horse_id:
          type: integer
          format: int64
        race_id:
          type: [integer, "null"]
          format: int64
          description: 紐づくレース ID。null の場合はレースに紐づかないメモ
        race:
          type: [object, "null"]
          description: レース紐づきありの場合に、表示用のレース情報を含む
          required: [uid, race_date, venue_name, race_number, race_name]
          properties:
            uid:
              type: string
            race_date:
              type: string
              format: date
            venue_name:
              type: string
            race_number:
              type: integer
            race_name:
              type: [string, "null"]
        content:
          type: string
          maxLength: 1000
          description: メモ本文 プレーンテキスト
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ValidationErrorBody:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    Unauthorized:
      description: 認証されていない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: 権限がない（他ユーザー所有の印列など）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 対象が存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
