openapi: 3.1.0
info:
  title: Keiba DB API
  version: 0.1.0
  description: |
    Keiba DB の REST API 定義。

    issue #183 では、レース詳細画面で使う「印（出走馬ごとの予想記号）」を
    自動保存するための API を定義する。

    レース詳細画面そのもの（レース情報＋出馬表＋初期表示用の印情報）は
    Inertia 経由でサーバーから渡されるため、対応する JSON GET API は持たない。
servers:
  - url: /
    description: 同一オリジン

tags:
  - name: race-mark-columns
    description: レースの印列（自分の印列・他人の印列）の管理
  - name: race-marks
    description: 出走馬ごとの印の値の設定・解除

paths:
  /api/races/{uid}/mark-columns:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
    get:
      tags: [race-mark-columns]
      summary: 自分が所有する印列の一覧取得
      description: |
        指定レースにおける、認証ユーザー所有の印列をすべて返す。
        `display_order` 昇順で返す。自分の印列（`type=own`）は必ず 1 件含まれ、
        存在しない場合はサーバ側で自動生成された上で返される。
      operationId: listRaceMarkColumns
      security:
        - sessionAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [race-mark-columns]
      summary: 他人の印列を追加
      description: |
        指定レースに「他人の印列」を 1 列追加する。
        `display_order` はサーバ側で末尾に採番される。
        自分の印列（`type=own`）はこの API では作成できない。
      operationId: createOtherRaceMarkColumn
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  maxLength: 32
                  description: 列ラベル（空文字列許容、後から PATCH で更新可能）
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/races/{uid}/mark-columns/{id}:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 印列 ID
    patch:
      tags: [race-mark-columns]
      summary: 列ラベル更新
      description: |
        他人の印列のラベルを更新する。自分の印列（`type=own`）に対してリクエストすると 422 を返す。
      operationId: updateRaceMarkColumnLabel
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  maxLength: 32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [race-mark-columns]
      summary: 他人の印列を削除
      description: |
        他人の印列とその列に紐づく印（`race_marks`）をすべて削除する。
        自分の印列（`type=own`）は削除できない（422 を返す）。
      operationId: deleteRaceMarkColumn
      security:
        - sessionAuth: []
      responses:
        "204":
          description: No Content
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/races/{uid}/mark-columns/{column_id}/entries/{race_entry_id}/mark:
    parameters:
      - $ref: "#/components/parameters/RaceUid"
      - name: column_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 印列 ID
      - name: race_entry_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: 出走馬 ID（race_entries.id）
    put:
      tags: [race-marks]
      summary: 印を設定（または解除）
      description: |
        指定列・指定出走馬に対する印を upsert する。
        `mark_value` が空文字列の場合は印を解除（該当レコードを削除）し、
        その場合のレスポンスは 204 を返す。
      operationId: putRaceMark
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mark_value]
              properties:
                mark_value:
                  oneOf:
                    - $ref: "#/components/schemas/MarkValue"
                    - type: string
                      enum: [""]
                      description: 空文字列を渡すと印を解除する
      responses:
        "200":
          description: 印を設定または更新した
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RaceMarkValue"
        "204":
          description: 印を解除した（mark_value が空文字列の場合）
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  parameters:
    RaceUid:
      name: uid
      in: path
      required: true
      schema:
        type: string
      description: レースの公開 UID（races.uid）

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: laravel_session
      description: Laravel のセッション Cookie。CSRF トークンも併用する。

  schemas:
    MarkValue:
      type: string
      enum:
        - "◎"
        - "○"
        - "▲"
        - "△"
        - "×"
        - "✓"
      description: 印の種類。6 種類のいずれか。

    RaceMarkColumnType:
      type: string
      enum: [own, other]
      description: |
        印列の種類。
        - `own`: ログインユーザー自身の印列。1 ユーザー 1 レースに 1 列固定。
        - `other`: 他人の印列。レース内で 0 列以上、動的に追加削除可能。

    RaceMarkColumn:
      type: object
      required: [id, type, label, display_order]
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/RaceMarkColumnType"
        label:
          type: [string, "null"]
          maxLength: 32
          description: 列ラベル。`type=own` のときは null。`type=other` のときは文字列（空文字列を含む）。
        display_order:
          type: integer
          minimum: 0
          description: 表示順。昇順で並べる。

    RaceMarkValue:
      type: object
      required: [column_id, race_entry_id, mark_value]
      properties:
        column_id:
          type: integer
          format: int64
          description: 印列 ID（race_mark_columns.id）
        race_entry_id:
          type: integer
          format: int64
          description: 出走馬 ID（race_entries.id）
        mark_value:
          $ref: "#/components/schemas/MarkValue"

    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ValidationErrorBody:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    Unauthorized:
      description: 認証されていない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: 権限がない（他ユーザー所有の印列など）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 対象が存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorBody"
