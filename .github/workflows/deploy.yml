name: auto-deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: source

    env:
      SSH_PRIVATE_KEY: ${{ secrets.SECRET_KEY }}
      USER: ${{ secrets.USER }}
      HOST: ${{ secrets.HOST }}
      ASSETS_BUILD_FILE_PATH: ${{ secrets.ASSETS_BUILD_FILE_PATH }}
      LARAVEL_DIR: ${{ secrets.LARAVEL_DIR }}

    steps:
      # ① ソース取得
      - name: Checkout
        uses: actions/checkout@v4

      # ② Nodeセットアップ
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      # ③ フロント依存インストール
      - name: Install dependencies
        run: pnpm install

      # ④ フロントビルド（★CIではここまで）
      - name: Build assets
        run: pnpm run build

      # ⑤ SSH セットアップ
      - name: Setup SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ⑥ アセット転送
      - name: Deploy assets via rsync
        run: |
          rsync -avz --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            ./public/build/ \
            ${USER}@${HOST}:${ASSETS_BUILD_FILE_PATH}

      # ⑦ サーバー側デプロイ（Laravel全部ここ）
      - name: Run remote deploy
        run: |
          ssh ${USER}@${HOST} << 'EOF'
            set -e

            cd ${LARAVEL_DIR}

            echo "== Enable maintenance mode =="
            php artisan down || true

            echo "== Git pull =="
            git fetch origin
            git reset --hard origin/main

            echo "== Install PHP dependencies =="
            composer install \
              --no-dev \
              --prefer-dist \
              --optimize-autoloader \
              --no-interaction

            echo "== Generate Laravel assets =="
            php artisan ziggy:generate || true
            php artisan route:cache
            php artisan config:cache
            php artisan view:cache

            echo "== Run migrations =="
            php artisan migrate --force

            echo "== Clear caches =="
            php artisan cache:clear || true
            php artisan config:clear || true
            php artisan route:clear || true
            php artisan view:clear || true

            echo "== Enable app =="
            php artisan up

            echo "== Deploy completed =="
          EOF